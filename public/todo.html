<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Todo</title>
  <link rel="icon" type="image/png" href="/tdo_logo.png?v=2" />
  <link rel="apple-touch-icon" href="/tdo_logo.png?v=2" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Todo" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f8f8;
      --bg2: #ffffff;
      --card: #ffffff;
      --border: #e5e5e5;
      --orange: #f97316;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --text: #1a2332;
      --muted: #9ca3af;
    }

    body {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 18px 24px;
      border-bottom: 1px dashed var(--border);
      background: var(--bg2);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header a {
      color: var(--muted);
      text-decoration: none;
      font-size: 1.2rem;
      line-height: 1;
      padding: 4px 8px 4px 0;
    }

    header a:hover { color: var(--text); }
    .header-title { font-size: 1.05rem; font-weight: 600; color: var(--orange); letter-spacing: 0.05em; }

    .main { flex: 1; max-width: 640px; width: 100%; margin: 0 auto; padding: 24px 16px 40px; }

    /* Add form */
    .add-form {
      margin-bottom: 24px;
      background: var(--card);
      border: 1px solid var(--border);
    }

    .add-row { display: flex; }

    .add-row input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px dashed var(--border);
      padding: 13px 16px;
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
    }

    body { font-size: 15px; }

    .add-row input:focus { border-bottom-color: var(--orange); }
    .add-row input::placeholder { color: var(--muted); }

    .btn-add {
      background: var(--orange);
      border: none;
      padding: 13px 20px;
      color: #000;
      font-size: 1.2rem;
      cursor: pointer;
      transition: opacity 0.15s;
      line-height: 1;
      flex-shrink: 0;
    }

    .btn-add:hover { opacity: 0.85; }

    .add-opts {
      display: flex;
      align-items: center;
    }

    .opt-select, .opt-input {
      background: transparent;
      border: none;
      border-right: 1px dashed var(--border);
      padding: 8px 10px;
      color: var(--muted);
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
    }

    .opt-select { flex-shrink: 0; }
    .opt-input { flex: 1; }
    .opt-input:last-child { border-right: none; }
    .opt-select:focus, .opt-input:focus { color: var(--text); }
    .opt-input::placeholder { color: var(--muted); }
    .opt-select option { background: var(--bg2); color: var(--text); }

    /* Filter tabs */
    .filters { display: flex; gap: 6px; margin-bottom: 16px; }

    .filter-btn {
      padding: 6px 14px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.83rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn.active {
      background: rgba(249,115,22,0.1);
      border-color: var(--orange);
      color: var(--orange);
    }

    /* Stats row */
    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .btn-clear {
      background: none;
      border: none;
      color: var(--red);
      font-size: 0.82rem;
      font-family: inherit;
      cursor: pointer;
      padding: 0;
      opacity: 0.7;
    }

    .btn-clear:hover { opacity: 1; }
    .btn-clear:disabled { opacity: 0.2; cursor: default; }

    /* Todo list */
    .todo-list { display: flex; flex-direction: column; gap: 8px; }

    .todo-item {
      background: var(--card);
      border-top: 1px dashed var(--border);
      border-bottom: 1px dashed var(--border);
      border-right: 1px solid var(--border);
      border-left: 3px solid var(--border);
      padding: 12px 14px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: opacity 0.2s;
      min-height: 80px;
    }

    @media (max-width: 640px) {
      .todo-item { min-height: 108px; }
      .btn-icon { opacity: 0.75; }
      .btn-icon.edit { color: var(--orange); }
      .btn-icon.delete { color: var(--red); }
      .btn-icon:hover,
      .btn-icon.edit:hover,
      .btn-icon.delete:hover { border-color: transparent; }
    }

    .todo-item[data-priority="high"]   { border-left-color: var(--red); }
    .todo-item[data-priority="medium"] { border-left-color: var(--yellow); }
    .todo-item[data-priority="low"]    { border-left-color: var(--muted); }

    .todo-item.done { opacity: 0.45; }

    .todo-checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      margin-top: 2px;
    }

    .todo-item.done .todo-checkbox { background: var(--green); border-color: var(--green); }

    .todo-checkbox::after {
      content: '';
      display: none;
      width: 5px;
      height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
    }

    .todo-item.done .todo-checkbox::after { display: block; }

    .todo-body { flex: 1; min-width: 0; }

    .todo-text {
      font-size: 0.95rem;
      line-height: 1.45;
      word-break: break-word;
    }

    .todo-item.done .todo-text { text-decoration: line-through; color: var(--muted); }

    .todo-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 6px;
    }

    .due-date {
      font-size: 0.78rem;
      color: var(--muted);
      background: var(--bg);
      padding: 2px 6px;
      border: 1px dashed var(--border);
    }

    .due-date.overdue { color: var(--red); border-color: var(--red); }

    .tag {
      font-size: 0.78rem;
      color: var(--orange);
      background: rgba(249,115,22,0.08);
      padding: 2px 6px;
      border: 1px dashed rgba(249,115,22,0.3);
    }

    .todo-actions {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      align-self: stretch;
    }

    .btn-icon {
      background: none;
      border: 1px dashed transparent;
      color: var(--muted);
      font-size: 1.05rem;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      opacity: 0.35;
      width: 30px;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-icon:hover { opacity: 1; border-color: var(--border); }
    .btn-icon.edit:hover { color: var(--orange); border-color: rgba(249,115,22,0.35); }
    .btn-icon.delete:hover { color: var(--red); border-color: rgba(239,68,68,0.35); }

    /* Tag input component */
    .tag-wrap { position: relative; flex: 1; min-width: 0; overflow: visible; }

    .tag-chips-area {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
      cursor: text;
      min-width: 0;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: rgba(249,115,22,0.1);
      border: 1px dashed rgba(249,115,22,0.35);
      color: var(--orange);
      font-size: 0.75rem;
      padding: 2px 6px;
      font-family: inherit;
      white-space: nowrap;
    }

    .chip button {
      background: none;
      border: none;
      color: var(--orange);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0;
      line-height: 1;
      opacity: 0.6;
    }

    .chip button:hover { opacity: 1; }

    .tag-field {
      background: transparent;
      border: none;
      outline: none;
      font-size: 0.85rem;
      font-family: inherit;
      color: var(--text);
      min-width: 60px;
      max-width: 100%;
      flex: 1;
    }

    .tag-field::placeholder { color: var(--muted); }

    .tag-drop {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-top: none;
      z-index: 200;
      display: none;
    }

    .tag-drop-item {
      padding: 8px 12px;
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--text);
      font-family: inherit;
    }

    .tag-drop-item:hover { background: rgba(249,115,22,0.08); color: var(--orange); }

    /* add form tag wrap */
    .opt-tag-wrap { border-right: none; padding: 0; }
    .opt-tag-wrap .tag-chips-area { padding: 6px 10px; }

    /* edit form tag wrap */
    .edit-tag-wrap { background: var(--bg); border: 1px dashed var(--border); padding: 0; }
    .edit-tag-wrap .tag-chips-area { padding: 4px 8px; }

    /* Edit mode */
    .todo-item.editing { flex-direction: column; gap: 10px; }

    .edit-top { display: flex; gap: 12px; width: 100%; align-items: flex-start; }

    .edit-form { flex: 1; display: flex; flex-direction: column; gap: 8px; }

    .edit-text {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--orange);
      padding: 4px 0;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
    }

    .edit-opts-row { display: flex; flex-direction: column; gap: 6px; }
    .edit-opts-top { display: flex; gap: 6px; }

    .edit-select, .edit-input {
      background: var(--bg);
      border: 1px dashed var(--border);
      padding: 5px 8px;
      color: var(--text);
      font-size: 0.83rem;
      font-family: inherit;
      outline: none;
    }

    .edit-input { flex: 1; min-width: 120px; }
    .edit-input::placeholder { color: var(--muted); }
    .edit-select option { background: var(--bg2); }

    .edit-btns { display: flex; gap: 8px; }

    .btn-save {
      background: var(--orange);
      border: none;
      padding: 5px 16px;
      color: #000;
      font-size: 0.83rem;
      font-family: inherit;
      cursor: pointer;
    }

    .btn-cancel-edit {
      background: none;
      border: 1px dashed var(--border);
      padding: 5px 16px;
      color: var(--muted);
      font-size: 0.83rem;
      font-family: inherit;
      cursor: pointer;
    }

    .empty {
      text-align: center;
      padding: 48px 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .empty span { display: block; font-size: 2rem; margin-bottom: 10px; }

    /* ── Projects ────────────────────────────────────────────────── */
    .projects-row {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .projects-row::-webkit-scrollbar { display: none; }

    .project-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.82rem;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .all-chip.active { border-color: var(--orange); color: var(--orange); background: rgba(249,115,22,0.08); }

    .project-chip.active {
      border-color: var(--pc);
      color: var(--pc);
      background: color-mix(in srgb, var(--pc) 10%, transparent);
    }

    .pc-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--pc, var(--muted)); flex-shrink: 0; }
    .pc-count { font-size: 0.72rem; opacity: 0.6; }
    .pc-x { font-size: 0.95rem; opacity: 0.35; margin-left: 1px; line-height: 1; }
    .pc-x:hover { opacity: 1; color: var(--red); }

    .btn-add-project { border-style: dashed; }

    .add-proj-inline {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 1px dashed var(--orange);
      padding: 4px 10px;
      flex-shrink: 0;
    }

    .add-project-input {
      background: transparent;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 0.82rem;
      color: var(--text);
      width: 110px;
    }
    .add-project-input::placeholder { color: var(--muted); }

    .btn-proj-confirm {
      background: none;
      border: none;
      color: var(--orange);
      cursor: pointer;
      font-size: 1rem;
      padding: 0;
      line-height: 1;
    }

    .project-meta-tag {
      font-size: 0.72rem;
      padding: 2px 6px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 1px dashed var(--border);
      color: var(--muted);
    }

    .project-meta-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  </style>
</head>
<body>

<header>
  <a href="/" title="Back to Hub">&#8592;</a>
  <div class="header-title">TODO</div>
</header>

<div class="main">
  <form class="add-form" id="addForm">
    <div class="add-row">
      <input type="text" id="newTodo" placeholder="Add a new task..." autocomplete="off" />
      <button type="submit" class="btn-add">+</button>
    </div>
    <div class="add-opts">
      <select id="newProject" class="opt-select">
        <option value="">project</option>
      </select>
      <select id="newPriority" class="opt-select">
        <option value="">priority</option>
        <option value="high">🔴 high</option>
        <option value="medium">🟡 medium</option>
        <option value="low">⚪ low</option>
      </select>
      <input type="date" id="newDueDate" class="opt-input" />
      <div class="tag-wrap opt-tag-wrap" id="tiWrap_add">
        <div class="tag-chips-area" id="tiChips_add" onclick="document.getElementById('tiField_add').focus()"></div>
        <div class="tag-drop" id="tiDrop_add"></div>
      </div>
    </div>
  </form>

  <div class="projects-row" id="projectsRow"></div>

  <div class="filters">
    <button class="filter-btn" data-filter="all">All</button>
    <button class="filter-btn active" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="done">Done</button>
  </div>

  <div class="stats">
    <span id="statsText">0 tasks remaining</span>
    <button class="btn-clear" id="clearBtn" disabled>Clear completed</button>
  </div>

  <div class="todo-list" id="todoList"></div>
</div>

<script>
  let todos = [];
  let projects = [];
  let filter = 'active';
  let activeProjectId = null;
  let editingId = null;
  let didJustStartEdit = false;
  let addingProject = false;

  async function load() {
    try {
      const [todosRes, projectsRes] = await Promise.all([
        fetch('/api/todos'),
        fetch('/api/projects')
      ]);
      todos = await todosRes.json();
      projects = await projectsRes.json();
      renderProjects();
      render();
    } catch (e) {}
  }

  function renderProjects() {
    const row = document.getElementById('projectsRow');
    if (!row) return;

    const chips = projects.map(p => {
      const active = activeProjectId === p.id ? ' active' : '';
      const count = todos.filter(t => t.projectId === p.id && !t.done).length;
      return `<button class="project-chip${active}" style="--pc:${escHtml(p.color)}" onclick="setProject('${p.id}')">
        <span class="pc-dot"></span>${escHtml(p.name)}<span class="pc-count">${count}</span>
        <span class="pc-x" onmousedown="event.stopPropagation()" onclick="event.stopPropagation();deleteProject('${p.id}')">×</span>
      </button>`;
    }).join('');

    const addPart = addingProject
      ? `<span class="add-proj-inline">
          <input class="add-project-input" id="projectInput" placeholder="name..." onkeydown="projectKeydown(event)" />
          <button class="btn-proj-confirm" onclick="confirmAddProject()">✓</button>
        </span>`
      : `<button class="project-chip btn-add-project" onclick="startAddProject()">+ New</button>`;

    const allActive = !activeProjectId ? ' active' : '';
    row.innerHTML = `<button class="project-chip all-chip${allActive}" onclick="setProject(null)">All</button>${chips}${addPart}`;

    if (addingProject) setTimeout(() => document.getElementById('projectInput')?.focus(), 0);

    const sel = document.getElementById('newProject');
    if (sel) {
      sel.innerHTML = '<option value="">project</option>' +
        projects.map(p => `<option value="${p.id}"${activeProjectId === p.id ? ' selected' : ''}>${escHtml(p.name)}</option>`).join('');
    }
  }

  function setProject(id) {
    activeProjectId = id;
    renderProjects();
    render();
  }

  function startAddProject() { addingProject = true; renderProjects(); }

  async function confirmAddProject() {
    const name = document.getElementById('projectInput')?.value.trim();
    if (!name) { addingProject = false; renderProjects(); return; }
    addingProject = false;
    const res = await fetch('/api/projects', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name })
    });
    const project = await res.json();
    projects.push(project);
    renderProjects();
  }

  function projectKeydown(e) {
    if (e.key === 'Enter') confirmAddProject();
    if (e.key === 'Escape') { addingProject = false; renderProjects(); }
  }

  async function deleteProject(id) {
    await fetch(`/api/projects/${id}`, { method: 'DELETE' });
    projects = projects.filter(p => p.id !== id);
    todos = todos.map(t => t.projectId === id ? { ...t, projectId: '' } : t);
    if (activeProjectId === id) activeProjectId = null;
    renderProjects();
    render();
  }

  async function addTodo(text, priority, dueDate, tags, projectId) {
    await fetch('/api/todos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, priority, dueDate, tags, projectId: projectId || '' })
    });
    load();
  }

  async function toggleTodo(id, done) {
    await fetch(`/api/todos/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ done: !done })
    });
    load();
  }

  async function updateTodo(id, data) {
    await fetch(`/api/todos/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    load();
  }

  async function deleteTodo(id) {
    await fetch(`/api/todos/${id}`, { method: 'DELETE' });
    load();
  }

  async function clearCompleted() {
    await fetch('/api/todos/completed', { method: 'DELETE' });
    load();
  }

  // ─── Tag input system ───────────────────────────────────────────
  const tiState = {};

  function getAllTags() {
    const s = new Set();
    todos.forEach(t => (t.tags || []).forEach(tag => s.add(tag)));
    return [...s].sort();
  }

  function tiInit(key, initialTags = []) {
    tiState[key] = [...initialTags];
    tiRenderChips(key);
  }

  function tiGetTags(key) { return tiState[key] || []; }

  function tiRenderChips(key) {
    const area = document.getElementById('tiChips_' + key);
    if (!area) return;
    const tags = tiState[key] || [];
    const chips = tags.map((tag, i) =>
      `<span class="chip">${escHtml(tag)}<button type="button" onclick="tiRemove('${key}',${i})">×</button></span>`
    ).join('');
    area.innerHTML = chips +
      `<input type="text" id="tiField_${key}" class="tag-field" placeholder="${tags.length ? '' : 'tags...'}" autocomplete="off"
        oninput="tiOnInput('${key}',this.value)"
        onfocus="tiOnFocus('${key}')"
        onkeydown="tiOnKeydown(event,'${key}')"
        onblur="setTimeout(()=>tiHideDrop('${key}'),150)" />`;
  }

  function tiRemove(key, i) {
    if (!tiState[key]) return;
    tiState[key].splice(i, 1);
    tiRenderChips(key);
  }

  function tiAdd(key, tag) {
    tag = tag.trim();
    if (!tag) return;
    if (!tiState[key]) tiState[key] = [];
    if (!tiState[key].includes(tag)) tiState[key].push(tag);
    tiRenderChips(key);
    tiHideDrop(key);
  }

  function tiShowDrop(key, val) {
    const current = tiState[key] || [];
    const matches = (val.trim()
      ? getAllTags().filter(t => !current.includes(t) && t.toLowerCase().includes(val.toLowerCase()))
      : getAllTags().filter(t => !current.includes(t))).slice(0, 5);
    const drop = document.getElementById('tiDrop_' + key);
    if (!drop || matches.length === 0) { tiHideDrop(key); return; }
    drop.innerHTML = matches.map(t =>
      `<div class="tag-drop-item" onmousedown="tiAdd('${key}','${escHtml(t)}');document.getElementById('tiField_${key}').value=''">${escHtml(t)}</div>`
    ).join('');
    drop.style.display = 'block';
  }

  function tiOnInput(key, val) { tiShowDrop(key, val); }
  function tiOnFocus(key) {
    const val = document.getElementById('tiField_' + key)?.value || '';
    tiShowDrop(key, val);
  }

  function tiOnKeydown(e, key) {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      tiAdd(key, e.target.value);
      e.target.value = '';
    } else if (e.key === 'Backspace' && !e.target.value) {
      if (tiState[key]?.length) { tiState[key].pop(); tiRenderChips(key); }
    } else if (e.key === 'Escape') {
      tiHideDrop(key);
    }
  }

  function tiHideDrop(key) {
    const drop = document.getElementById('tiDrop_' + key);
    if (drop) drop.style.display = 'none';
  }
  // ────────────────────────────────────────────────────────────────

  function startEdit(id) {
    didJustStartEdit = true;
    editingId = id;
    render();
    setTimeout(() => {
      const todo = todos.find(t => t.id === id);
      tiInit(id, todo?.tags || []);
      const el = document.querySelector('.edit-text');
      if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
      didJustStartEdit = false;
    }, 0);
  }

  function editKeydown(e, id) {
    if (e.key === 'Enter') { e.preventDefault(); saveEdit(id); }
    if (e.key === 'Escape') { e.preventDefault(); cancelEdit(); }
  }

  function cancelEdit() {
    editingId = null;
    render();
  }

  async function saveEdit(id) {
    const item = document.querySelector(`.todo-item[data-id="${id}"]`);
    const text = item.querySelector('.edit-text')?.value.trim();
    if (!text) return;
    const selects = item.querySelectorAll('.edit-select');
    const priority = selects[0]?.value || '';
    const projectId = selects[1]?.value || '';
    const dueDate = item.querySelector('.edit-due')?.value || '';
    const tags = tiGetTags(id);
    editingId = null;
    await updateTodo(id, { text, priority, dueDate, tags, projectId });
  }

  function isOverdue(dueDate, done) {
    if (!dueDate || done) return false;
    return dueDate < new Date().toISOString().split('T')[0];
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const [y, m, d] = dateStr.split('-');
    return `${d}/${m}/${y}`;
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderItem(t) {
    const overdue = isOverdue(t.dueDate, t.done);
    const metaParts = [];
    if (t.dueDate) metaParts.push(`<span class="due-date${overdue ? ' overdue' : ''}">${formatDate(t.dueDate)}</span>`);
    if (t.tags?.length) t.tags.forEach(tag => metaParts.push(`<span class="tag">#${escHtml(tag)}</span>`));
    if (t.projectId && !activeProjectId) {
      const proj = projects.find(p => p.id === t.projectId);
      if (proj) metaParts.push(`<span class="project-meta-tag"><span class="project-meta-dot" style="background:${escHtml(proj.color)}"></span>${escHtml(proj.name)}</span>`);
    }
    const meta = metaParts.length ? `<div class="todo-meta">${metaParts.join('')}</div>` : '';

    if (t.id === editingId) {
      return `
        <div class="todo-item editing" data-id="${t.id}" data-priority="${t.priority || ''}">
          <div class="edit-top">
            <div class="todo-checkbox"></div>
            <div class="edit-form">
              <input class="edit-text" type="text" value="${escHtml(t.text)}" onkeydown="editKeydown(event,'${t.id}')" />
              <div class="edit-opts-row">
                <div class="edit-opts-top">
                  <select class="edit-select">
                    <option value="" ${!t.priority ? 'selected' : ''}>priority</option>
                    <option value="high" ${t.priority === 'high' ? 'selected' : ''}>🔴 high</option>
                    <option value="medium" ${t.priority === 'medium' ? 'selected' : ''}>🟡 medium</option>
                    <option value="low" ${t.priority === 'low' ? 'selected' : ''}>⚪ low</option>
                  </select>
                  <select class="edit-select edit-project">
                    <option value="">project</option>
                    ${projects.map(p => `<option value="${p.id}"${t.projectId === p.id ? ' selected' : ''}>${escHtml(p.name)}</option>`).join('')}
                  </select>
                  <input class="edit-input edit-due" type="date" value="${t.dueDate || ''}" />
                </div>
                <div class="tag-wrap edit-tag-wrap" id="tiWrap_${t.id}">
                  <div class="tag-chips-area" id="tiChips_${t.id}" onclick="document.getElementById('tiField_${t.id}').focus()"></div>
                  <div class="tag-drop" id="tiDrop_${t.id}"></div>
                </div>
              </div>
              <div class="edit-btns">
                <button type="button" class="btn-save" onclick="saveEdit('${t.id}')">Done</button>
              </div>
            </div>
          </div>
        </div>`;
    }

    return `
      <div class="todo-item ${t.done ? 'done' : ''}" data-id="${t.id}" data-priority="${t.priority || ''}">
        <div class="todo-checkbox" onclick="toggleTodo('${t.id}', ${t.done})"></div>
        <div class="todo-body">
          <div class="todo-text">${escHtml(t.text)}</div>
          ${meta}
        </div>
        <div class="todo-actions">
          <button class="btn-icon edit" onclick="startEdit('${t.id}')" title="Edit">✎</button>
          <button class="btn-icon delete" onclick="deleteTodo('${t.id}')" title="Delete">✕</button>
        </div>
      </div>`;
  }

  function render() {
    const scoped = activeProjectId ? todos.filter(t => t.projectId === activeProjectId) : todos;
    const filtered = scoped.filter(t => {
      if (filter === 'active') return !t.done;
      if (filter === 'done') return t.done;
      return true;
    });

    const remaining = scoped.filter(t => !t.done).length;
    const completed = scoped.filter(t => t.done).length;

    document.getElementById('statsText').textContent =
      `${remaining} task${remaining !== 1 ? 's' : ''} remaining`;
    document.getElementById('clearBtn').disabled = completed === 0;

    const list = document.getElementById('todoList');

    if (filtered.length === 0) {
      const msgs = { all: ['📋', 'No tasks yet'], active: ['✅', 'All done!'], done: ['📋', 'Nothing completed yet'] };
      const [icon, msg] = msgs[filter];
      list.innerHTML = `<div class="empty"><span>${icon}</span>${msg}</div>`;
      return;
    }

    list.innerHTML = filtered.map(renderItem).join('');
  }

  document.getElementById('addForm').addEventListener('submit', e => {
    e.preventDefault();
    const input = document.getElementById('newTodo');
    const text = input.value.trim();
    if (!text) return;
    const projectId = document.getElementById('newProject').value || activeProjectId || '';
    const priority = document.getElementById('newPriority').value;
    const dueDate = document.getElementById('newDueDate').value;
    const tags = tiGetTags('add');
    input.value = '';
    document.getElementById('newProject').value = '';
    document.getElementById('newPriority').value = '';
    document.getElementById('newDueDate').value = '';
    tiInit('add', []);
    addTodo(text, priority, dueDate, tags, projectId);
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  document.getElementById('clearBtn').addEventListener('click', clearCompleted);

  document.addEventListener('keydown', (e) => {
    if (editingId && e.key === 'Escape') cancelEdit();
  });

  load();
  tiInit('add', []);
</script>
</body>
</html>
