<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Hub</title>
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="My Hub" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0e1a;
      --bg2: #13141f;
      --card: #181926;
      --border: #252638;
      --orange: #f97316;
      --purple: #8b5cf6;
      --text: #e2e8f0;
      --muted: #64748b;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      padding: 24px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--bg2);
    }

    header img { width: 44px; height: 44px; object-fit: contain; border-radius: 10px; }
    .header-text h1 { font-size: 1.2rem; font-weight: 600; color: var(--orange); letter-spacing: 0.05em; }
    .header-text p { font-size: 0.75rem; color: var(--muted); margin-top: 2px; letter-spacing: 0.08em; text-transform: uppercase; }

    .container { max-width: 900px; margin: 0 auto; padding: 40px 24px; }

    .section-title {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .app-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px 20px;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      transition: border-color 0.15s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .app-card:hover {
      border-color: var(--orange);
      transform: translateY(-2px);
    }

    .app-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    .app-icon img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      border-radius: 16px;
    }

    .app-name { font-size: 0.95rem; font-weight: 500; text-align: center; }
    .app-desc { font-size: 0.75rem; color: var(--muted); text-align: center; line-height: 1.4; }

    .app-badge {
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(249,115,22,0.15);
      color: var(--orange);
    }

    /* Coming soon card */
    .app-card.coming-soon {
      opacity: 0.4;
      cursor: default;
      pointer-events: none;
    }

    @media (max-width: 480px) {
      header { padding: 16px 20px; }
      .container { padding: 28px 16px; }
      .apps-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .app-card { padding: 20px 14px; }
      .app-icon { width: 52px; height: 52px; }
      .app-icon img { width: 52px; height: 52px; }
    }
  </style>
</head>
<body>

<header>
  <img src="/logo.png" alt="Hub" />
  <div class="header-text">
    <h1>MY HUB</h1>
    <p>Personal App Launcher</p>
  </div>
</header>

<div class="container">
  <div class="section-title">Apps</div>
  <div class="apps-grid">

    <a class="app-card" href="/health">
      <div class="app-icon"><img src="/logo.png" alt="Health" /></div>
      <div class="app-name">Weight Tracker</div>
      <div class="app-desc">Track daily weight & progress</div>
      <span class="app-badge">Active</span>
    </a>

    <div class="app-card coming-soon">
      <div class="app-icon" style="background:rgba(139,92,246,0.15);color:#8b5cf6;">+</div>
      <div class="app-name">Coming Soon</div>
      <div class="app-desc">More apps will appear here</div>
    </div>

  </div>
</div>

</body>
</html>
