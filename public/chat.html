<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AI Chat</title>
  <link rel="icon" type="image/png" href="/lut_logo.png?v=2" />
  <link rel="apple-touch-icon" href="/lut_logo.png?v=2" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="AI Chat" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f8f8;
      --bg2: #ffffff;
      --border: #e5e5e5;
      --orange: #f97316;
      --text: #1a2332;
      --muted: #9ca3af;
    }

    body {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      flex-shrink: 0;
      padding: 16px 20px;
      padding-top: calc(16px + env(safe-area-inset-top));
      background: var(--bg2);
      border-bottom: 1px dashed var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header a {
      color: var(--muted);
      text-decoration: none;
      font-size: 1.2rem;
      line-height: 1;
      padding: 4px 8px 4px 0;
    }
    header a:hover { color: var(--text); }

    .header-title { font-size: 1rem; font-weight: 600; color: var(--orange); flex: 1; letter-spacing: 0.05em; }

    .btn-clear {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.75rem;
      font-family: inherit;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-clear:hover { border-color: var(--orange); color: var(--orange); }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .inner { max-width: 680px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }

    .msg { display: flex; flex-direction: column; max-width: 85%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.ai { align-self: flex-start; align-items: flex-start; }

    .msg-label {
      font-size: 0.62rem;
      color: var(--muted);
      margin-bottom: 4px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .msg-bubble {
      padding: 12px 16px;
      font-size: 0.875rem;
      line-height: 1.65;
      word-break: break-word;
    }

    .msg.user .msg-bubble {
      background: var(--orange);
      color: #fff;
    }

    .msg.ai .msg-bubble {
      background: var(--bg2);
      color: var(--text);
      border-top: 1px dashed var(--border);
      border-bottom: 1px dashed var(--border);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    .msg.ai .msg-bubble strong { color: var(--orange); }
    .msg.ai .msg-bubble code {
      background: var(--bg);
      padding: 1px 5px;
      font-family: inherit;
      font-size: 0.82em;
    }

    /* Typing indicator */
    .typing {
      align-self: flex-start;
      display: none;
    }
    .typing.visible { display: flex; }
    .typing-bubble {
      background: var(--bg2);
      border-top: 1px dashed var(--border);
      border-bottom: 1px dashed var(--border);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      padding: 14px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .dot {
      width: 7px; height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-4px); }
    }

    /* Input area */
    .input-area {
      flex-shrink: 0;
      background: var(--bg2);
      border-top: 1px dashed var(--border);
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
    }

    .input-area form {
      display: flex;
      gap: 10px;
      max-width: 680px;
      margin: 0 auto;
    }

    .input-area input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 12px 16px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .input-area input:focus { border-color: var(--orange); }
    .input-area input::placeholder { color: var(--muted); }
    .input-area input:disabled { opacity: 0.5; }

    .btn-send {
      background: var(--orange);
      border: none;
      padding: 12px 20px;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      transition: opacity 0.15s;
      line-height: 1;
    }
    .btn-send:hover { opacity: 0.85; }
    .btn-send:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>

<header>
  <a href="/" title="Back to Hub">&#8592;</a>
  <div class="header-title">AI CHAT</div>
  <button class="btn-clear" onclick="clearChat()">Clear</button>
</header>

<div class="chat-area" id="chatArea">
  <div class="inner" id="inner">
    <div class="typing" id="typing">
      <div class="typing-bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>
</div>

<div class="input-area">
  <form id="chatForm">
    <input type="text" id="msgInput" placeholder="Ask me anything..." autocomplete="off" />
    <button type="submit" class="btn-send" id="sendBtn">&#10148;</button>
  </form>
</div>

<script>
  let history = [];

  const inner = document.getElementById('inner');
  const typing = document.getElementById('typing');
  const chatArea = document.getElementById('chatArea');
  const msgInput = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');

  function escHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function formatText(text) {
    return escHtml(text)
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\n/g, '<br>');
  }

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="msg-label">${role === 'user' ? 'You' : 'AI'}</div>
      <div class="msg-bubble">${formatText(text)}</div>
    `;
    inner.insertBefore(div, typing);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function setLoading(on) {
    typing.classList.toggle('visible', on);
    sendBtn.disabled = on;
    msgInput.disabled = on;
    if (on) chatArea.scrollTop = chatArea.scrollHeight;
  }

  async function sendMessage(text) {
    addMessage('user', text);
    setLoading(true);

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history })
      });

      const data = await res.json();
      setLoading(false);

      if (!res.ok) {
        addMessage('ai', 'Error: ' + (data.error || 'Something went wrong'));
        return;
      }

      history = data.history;
      addMessage('ai', data.text);
    } catch (err) {
      setLoading(false);
      addMessage('ai', 'Connection error. Please check the server.');
    }
  }

  function clearChat() {
    history = [];
    const msgs = inner.querySelectorAll('.msg');
    msgs.forEach(m => m.remove());
    addMessage('ai', 'Chat cleared. How can I help you?');
  }

  document.getElementById('chatForm').addEventListener('submit', e => {
    e.preventDefault();
    const text = msgInput.value.trim();
    if (!text || sendBtn.disabled) return;
    msgInput.value = '';
    sendMessage(text);
  });

  // Welcome message
  addMessage('ai', 'Hello! I can help manage your todo list and weight tracking, or just have a general chat. What would you like to do?');
</script>
</body>
</html>
